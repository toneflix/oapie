name: Publish to NPM

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (optional)'
        required: false
        default: ''

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Resolve publish version
        id: publish_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          normalize_version() {
            echo "$1" | sed 's/^v//'
          }

          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "Current package.json version: $CURRENT_VERSION"

          REQUESTED_VERSION=""
          VERSION_SOURCE="auto"

          if [ -n "$INPUT_VERSION" ]; then
            REQUESTED_VERSION=$(normalize_version "$INPUT_VERSION")
            VERSION_SOURCE="workflow input"
          elif [ "$EVENT_NAME" = "release" ] && [ -n "$RELEASE_TAG" ]; then
            REQUESTED_VERSION=$(normalize_version "$RELEASE_TAG")
            VERSION_SOURCE="release tag"
          elif [ "$REF_TYPE" = "tag" ] && [ -n "$REF_NAME" ]; then
            REQUESTED_VERSION=$(normalize_version "$REF_NAME")
            VERSION_SOURCE="git tag"
          fi

          if [ -n "$REQUESTED_VERSION" ]; then
            echo "Using version from $VERSION_SOURCE: $REQUESTED_VERSION"

            if [ "$CURRENT_VERSION" != "$REQUESTED_VERSION" ]; then
              pnpm version "$REQUESTED_VERSION" --no-git-tag-version
              echo "version_bumped=true" >> $GITHUB_OUTPUT
            else
              echo "version_bumped=false" >> $GITHUB_OUTPUT
            fi

            echo "new_version=$REQUESTED_VERSION" >> $GITHUB_OUTPUT
            echo "version_source=$VERSION_SOURCE" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get published version from npm (suppress errors if package doesn't exist)
          PUBLISHED_VERSION=$(pnpm view oapiex version 2>/dev/null || echo "0.0.0")
          echo "Published npm version: $PUBLISHED_VERSION"

          # Function to compare versions
          compare_versions() {
            if [ "$1" = "$2" ]; then
              echo "equal"
            else
              # Use sort -V for version comparison
              SORTED=$(printf "%s\n%s" "$1" "$2" | sort -V | head -n1)
              if [ "$SORTED" = "$1" ]; then
                echo "less"
              else
                echo "greater"
              fi
            fi
          }

          COMPARISON=$(compare_versions "$CURRENT_VERSION" "$PUBLISHED_VERSION")
          echo "Version comparison: $COMPARISON"

          if [ "$COMPARISON" = "equal" ] || [ "$COMPARISON" = "less" ]; then
            echo "Version conflict detected. Auto-bumping version..."
            
            # Parse version components
            IFS='.' read -r MAJOR MINOR PATCH <<< "$PUBLISHED_VERSION"
            
            # Bump patch version
            NEW_PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            
            echo "New version: $NEW_VERSION"
            
            # Update package.json
            pnpm version "$NEW_VERSION" --no-git-tag-version
            
            echo "version_bumped=true" >> $GITHUB_OUTPUT
            echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "version_source=auto bump" >> $GITHUB_OUTPUT
          else
            echo "Version is valid. Proceeding with current version."
            echo "version_bumped=false" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "version_source=package.json" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push version bump
        if: steps.publish_version.outputs.version_bumped == 'true'
        run: |
          git add package.json
          git commit -m "chore: set version to ${{ steps.publish_version.outputs.new_version }} [skip ci]"
          git push origin HEAD:main

      - name: Run linter
        run: pnpm lint

      - name: Run tests
        run: pnpm test

      - name: Build project
        run: pnpm build

      - name: Publish to NPM
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Bump workspace package versions
        id: workspace_packages
        run: |
          CHANGED=false
          PUBLISHED_PACKAGES=()
          PUBLISHED_PACKAGE_DIRS=()

          for package_json in packages/*/package.json; do
            if [ ! -f "$package_json" ]; then
              continue
            fi

            PACKAGE_DIR=$(dirname "$package_json")
            PACKAGE_NAME=$(node -p "require('./$package_json').name")
            PACKAGE_PRIVATE=$(node -p "String(Boolean(require('./$package_json').private))")

            if [ "$PACKAGE_PRIVATE" = "true" ]; then
              continue
            fi

            (
              cd "$PACKAGE_DIR"
              pnpm version patch --no-git-tag-version
            )
            NEW_PACKAGE_VERSION=$(node -p "require('./$package_json').version")
            PUBLISHED_PACKAGES+=("${PACKAGE_NAME}@${NEW_PACKAGE_VERSION}")
            PUBLISHED_PACKAGE_DIRS+=("$PACKAGE_DIR")
            CHANGED=true
          done

          if [ "$CHANGED" = "true" ]; then
            git add packages/*/package.json
            git commit -m "chore: bump workspace package versions [skip ci]"
            git push origin HEAD:main
          fi

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT
          {
            echo 'packages<<EOF'
            printf '%s\n' "${PUBLISHED_PACKAGES[@]}"
            echo 'EOF'
            echo 'package_dirs<<EOF'
            printf '%s\n' "${PUBLISHED_PACKAGE_DIRS[@]}"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Publish workspace packages
        if: steps.workspace_packages.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          PACKAGE_DIRS: ${{ steps.workspace_packages.outputs.package_dirs }}
        run: |
          while IFS= read -r package_dir; do
            if [ -z "$package_dir" ]; then
              continue
            fi

            (
              cd "$package_dir"
              pnpm publish --access public --no-git-checks
            )
          done <<< "$PACKAGE_DIRS"

      - name: Create GitHub release
        if: ${{ github.event_name != 'release' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: v${{ steps.publish_version.outputs.new_version }}
          WORKSPACE_PACKAGES: ${{ steps.workspace_packages.outputs.packages }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
            exit 0
          fi

          NOTES=$(mktemp)
          {
            echo "Published version ${{ steps.publish_version.outputs.new_version }} to npm."
            echo
            echo "Version source: ${{ steps.publish_version.outputs.version_source }}"
            if [ -n "$WORKSPACE_PACKAGES" ]; then
              echo
              echo "Workspace packages published:"
              echo "$WORKSPACE_PACKAGES" | sed 's/^/- /'
            fi
          } > "$NOTES"

          gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file "$NOTES"

      - name: Create release notes
        if: always()
        run: |
          echo "Published version ${{ steps.publish_version.outputs.new_version }} to npm" >> $GITHUB_STEP_SUMMARY
          echo "Version source: ${{ steps.publish_version.outputs.version_source }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.workspace_packages.outputs.changed }}" = "true" ]; then
            echo "Workspace packages published:" >> $GITHUB_STEP_SUMMARY
            echo "${{ steps.workspace_packages.outputs.packages }}" | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
          fi
